<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba de Conexión a Supabase</title>
    <!-- 1. Carga de la librería de Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #test-result {
            padding: 40px;
            border-radius: 10px;
            font-size: 1.5em;
            font-weight: bold;
            text-align: center;
            max-width: 80%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1 );
            border: 2px solid;
        }
        #test-result.success {
            background-color: #d4edda;
            color: #155724;
            border-color: #c3e6cb;
        }
        #test-result.error {
            background-color: #f8d7da;
            color: #721c24;
            border-color: #f5c6cb;
        }
        #test-result small {
            display: block;
            font-size: 0.7em;
            font-weight: normal;
            margin-top: 15px;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <div id="test-result">Probando conexión...</div>

    <script>
        // 2. Tus credenciales exactas
        const SUPABASE_URL = 'https://esiklpxyectbekxvajnw.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzaWtscHh5ZWN0YmVreHZham53Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE2OTI1MjEsImV4cCI6MjA3NzI2ODUyMX0.mtQnqUrTmhmN1DQxOAUnGpizhYZobStHDH0cz_XfKGU';
        
        const testResultDiv = document.getElementById('test-result' );

        async function runConnectionTest() {
            try {
                // 3. Inicialización CORRECTA de Supabase
                const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

                // 4. Intento de leer datos (la prueba más simple)
                const { data, error } = await supabase
                    .from('data_reportes')
                    .select('id')
                    .limit(1);

                // 5. Verificación del resultado
                if (error) {
                    // Si la API devuelve un error (ej: RLS, etc.)
                    throw error;
                }

                // Si no hay error, la conexión y la lectura son exitosas
                testResultDiv.className = 'success';
                testResultDiv.innerHTML = '¡CONEXIÓN EXITOSA!';
                console.log('Prueba exitosa. Datos recibidos:', data);

            } catch (err) {
                // Si algo falla en cualquier punto (conexión, inicialización, etc.)
                testResultDiv.className = 'error';
                testResultDiv.innerHTML = `FALLO EN LA CONEXIÓN <small>${err.message}</small>`;
                console.error('Detalle del error:', err);
            }
        }

        // Ejecutar la prueba al cargar la página
        runConnectionTest();
    </script>

</body>
</html>
